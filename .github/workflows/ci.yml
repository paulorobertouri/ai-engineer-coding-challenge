name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend (C#)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Restore
        run: dotnet restore backend/AIEngineerCodingChallenge.Backend.slnx
        
      - name: Check Format
        run: dotnet format backend/AIEngineerCodingChallenge.Backend.slnx --verify-no-changes
        
      - name: Build
        run: dotnet build backend/AIEngineerCodingChallenge.Backend.slnx --no-restore -c Release

      - name: Test With Coverage
        run: |
          dotnet test backend/src/Api.Tests/Api.Tests.csproj --no-build -c Release \
            --collect:"XPlat Code Coverage" \
            --results-directory backend/coverage

      - name: Upload Backend Coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
          if-no-files-found: error

  frontend:
    name: Frontend (TS/React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Check OpenAPI Type Generation
        working-directory: frontend
        run: npm run check:api-types
        
      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Check Format
        working-directory: frontend
        run: npx prettier --check .
        
      - name: Test With Coverage
        working-directory: frontend
        run: npm test -- --coverage

      - name: Upload Frontend Coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: error

      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker Build Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker compose --file docker-compose.yml build backend

      - name: Build Frontend Image
        run: docker compose --file docker-compose.yml build frontend

  dependencies-security:
    name: Dependency Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Restore Backend
        run: dotnet restore backend/AIEngineerCodingChallenge.Backend.slnx

      - name: Check .NET Vulnerabilities
        run: dotnet list backend/AIEngineerCodingChallenge.Backend.slnx package --vulnerable --include-transitive

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit Frontend Dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Install E2E Dependencies
        working-directory: e2e
        run: npm ci

      - name: Audit E2E Dependencies
        working-directory: e2e
        run: npm audit --audit-level=high

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker-build, dependencies-security]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Restore backend
        run: dotnet restore backend/AIEngineerCodingChallenge.Backend.slnx

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chrome

      - name: Run Playwright e2e tests
        working-directory: e2e
        env:
          CI: 'true'
          OpenAI__ApiKey: ''
        run: npx playwright test

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            e2e/playwright-report
            e2e/test-results
          if-no-files-found: ignore
