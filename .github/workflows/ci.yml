name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend (C#)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Restore
        run: dotnet restore backend/AIEngineerCodingChallenge.Backend.slnx
        
      - name: Check Format
        run: dotnet format backend/AIEngineerCodingChallenge.Backend.slnx --verify-no-changes
        
      - name: Build
        run: dotnet build backend/AIEngineerCodingChallenge.Backend.slnx --no-restore -c Release
        
      - name: Test
        run: dotnet test backend/src/Api.Tests/Api.Tests.csproj --no-build -c Release

  frontend:
    name: Frontend (TS/React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install
        working-directory: frontend
        run: npm ci
        
      - name: Lint
        working-directory: frontend
        run: npm run lint
        
      - name: Test
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build
