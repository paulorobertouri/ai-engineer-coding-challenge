services:
  backend:
    build:
      context: ./backend/src/Api
      dockerfile: Dockerfile
    ports:
      - "${PORT:-5181}:8080"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/v1/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    volumes:
      - backend_data:/app/Data
      - ./knowledge-base:/knowledge-base:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:8080"
    environment:
      - BACKEND_API_URL=${BACKEND_API_URL:-http://localhost:5181}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    depends_on:
      - backend

volumes:
  backend_data:
